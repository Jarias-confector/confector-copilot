[project]
name = "confector-events"
version = "0.1.0"
description = "Event Bus interno del sistema (07_EVENT_ARCHITECTURE). MVP: dispatcher en proceso, sin Kafka/RabbitMQ/Redis."
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
